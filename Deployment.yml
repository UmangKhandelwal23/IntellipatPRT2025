apiVersion: apps/v1
kind: deployment
metadata:
  name: deploy on private server
spec:
  replicas: 2
  selector:
   matchLabels:
    app: frontend
  template:
   metadata:
    labels:
     app: frontend
   containers:
    - name: mycontainer
      image: umangkhandelwal/intellipat2025:v2
      imagePullPolicy: Always
      ports:
       - containerPort: 80
